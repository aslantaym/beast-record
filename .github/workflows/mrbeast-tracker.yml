name: MrBeast View Tracker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Prevent overlapping runs (important for cron jobs)
concurrency:
  group: mrbeast-tracker
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install system dependencies for graphs
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev libjpeg-dev libfreetype6-dev fonts-dejavu

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib

      - name: Run tracker
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python mrbeast_tracker.py

      # Commit only if there are changes
      - name: Commit & push changes (if any)
        run: |
          git config user.name "mrbeast-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A videos state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update mrbeast videos + graphs"
            git push
          fi
