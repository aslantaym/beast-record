name: MrBeast View Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas matplotlib   # ← Added pandas + matplotlib for graphs

      - name: Run tracker
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python mrbeast_tracker.py

      - name: Commit & push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update mrbeast videos + graphs"
          file_pattern: "videos/** state.json"   # ← Now commits all per-video files + graphs
          commit_user_name: "mrbeast-bot"
          commit_user_email: "bot@users.noreply.github.com"
